version: '3.9'

services:
  aman:
    build: .
    container_name: aman-translator
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist data outside container (never delete this folder!)
      - ./data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Uncomment to add nginx reverse proxy:
