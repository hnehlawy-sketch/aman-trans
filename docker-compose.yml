version: '3.9'

services:
  aman:
    build: .
    container_name: aman-translator
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist data.json outside container
      - ./data:/app/backend/data
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATA_DIR=/app/backend/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: nginx reverse proxy (uncomment to use)
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
