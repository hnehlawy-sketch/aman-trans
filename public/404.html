<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>أمان — 404 الصفحة غير موجودة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#0b0f1a;color:#e2ddd4;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px}
.box{max-width:420px}
.num{font-size:8rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#c9a84c,#2dd4a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
h1{font-size:1.5rem;font-weight:800;margin-bottom:10px}
p{color:#7a7060;font-size:.95rem;line-height:1.7;margin-bottom:28px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{padding:10px 22px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:.9rem;font-weight:700;text-decoration:none;transition:all .2s}
.a-home{background:linear-gradient(135deg,#c9a84c,#9a6f18);color:#0b0f1a}
.a-home:hover{transform:translateY(-2px);box-shadow:0 5px 18px rgba(201,168,76,.35)}
.a-app{background:transparent;border:1px solid #252f42;color:#e2ddd4}
.a-app:hover{border-color:#c9a84c;color:#c9a84c}
</style>
</head>
<body>
<div class="box">
  <div class="num">404</div>
  <h1>الصفحة غير موجودة</h1>
  <p>عذراً، الصفحة التي تبحث عنها غير موجودة أو تمت إزالتها.</p>
  <div class="links">
    <a href="/" class="a-home">🏠 الرئيسية</a>
    <a href="/app" class="a-app">📱 التطبيق</a>
  </div>
</div>
</body>
</html>
